name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Stamp build version
        id: version
        shell: bash
        run: |
          DATE="$(date -u +%y.%m.%d)"
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          CLEAN_BRANCH="$(echo "${BRANCH}" | sed 's/[^a-zA-Z0-9._-]/-/g')"
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${DATE}-${CLEAN_BRANCH}.${SHORT_SHA}"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Build version: ${VERSION}"

      - name: Build and test
        run: mvn -B -ntp -Drevision=${{ steps.version.outputs.version }} test
