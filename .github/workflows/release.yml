name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Stamp build version
        id: version
        shell: bash
        run: |
          DATE="$(date -u +%y.%m.%d)"
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${DATE}-dev.${GITHUB_RUN_NUMBER}.${SHORT_SHA}"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Build version: ${VERSION}"

      - name: Build package
        run: mvn -B -ntp -Drevision=${{ steps.version.outputs.version }} package

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "${VERSION}" \
            target/VelocityDynamicPlayercount-${VERSION}.jar \
            --title "${VERSION}" \
            --generate-notes
